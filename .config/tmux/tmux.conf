set -g default-command "bash"
set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"

set -sg escape-time 10
set -g focus-events on

set -g mouse on
setw -g mode-keys vi

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename on

set -g status-style "fg=white,bg=black"
set -g message-style "fg=white,bg=black"
set -g mode-style "fg=default,bg=#563a60"

set -g status-left-length 0
set -g status-left ""
set -g status-right-length 0
set -g status-right ""

# set -g status-left-length 100
# set -g status-left "#[fg=#f2b7ff] [#S] "
# set -g status-right-length 100
# set -g status-right "#[fg=#f2b7ff] %H:%M %Y-%m-%d "

set -g status-position top
set -g status-justify centre
setw -g window-status-current-format "#[fg=#f2b7ff,bold] #I:#W* "
setw -g window-status-format " #I:#W- "

set -g pane-active-border-style 'fg=#563a60'
set -g pane-border-style 'fg=#2e1d38'

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind r source-file ~/.config/tmux/tmux.conf

bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind -r C-n next-window
bind -r C-p previous-window

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r C-h select-pane -L
bind -r C-j select-pane -D
bind -r C-k select-pane -U
bind -r C-l select-pane -R
