background {
    path = /home/herlihy/dotfiles/resources/tuscany-pixel-art.jpg
    blur_passes = 4
    blur_size = 6
    noise = 0
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.2
    color = rgba(0e0216ff)
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(f2b7ffff)
    inner_color = rgba(0e0216ff)
    font_color = rgba(f9ecffff)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %B %d')"
    color = rgba(f9ecffff)
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgba(f2b7ffff)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = Welcome back
    color = rgba(a488f6ff)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -120
    halign = center
    valign = center
}
