################
### MONITORS ###
################

monitor = , preferred, auto, 1
source = ./hyprland-monitors.conf

#################
### AUTOSTART ###
#################

exec-once = hyprpaper
exec-once = waybar
exec-once = swaync

exec-once = ghostty

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24


#####################
### LOOK AND FEEL ###
#####################

general {
    border_size = 2
    gaps_in = 5
    gaps_out = 10

    col.inactive_border = rgba(563a60ff)
    col.active_border = rgba(f2b7ffff) rgba(a488f6ff) 45deg
}

decoration {
    rounding = 10

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(0e0216ff)
    }
}

animations {
    enabled = off;
}

input {
    kb_options = ctrl:nocaps
    sensitivity = -0.4
    follow_mouse = 1
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgba(0e0216ff)
}

cursor {
    no_hardware_cursors = 1
    inactive_timeout = 3
    hide_on_key_press = true
    hide_on_touch = true
    hide_on_tablet = true
}

####################
### KEYBINDINGS ####
####################

# Utilities
bind = CTRL ALT, delete, exit,
bind = ALT, q, exec, wlogout
bind = ALT, s, exec, systemctl suspend && hyprlock
bind = ALT, c, killactive,
bind = ALT SHIFT, c, forcekillactive,
bind = ALT, f, fullscreen, toggle
bind = ALT SHIFT, f, togglefloating

# Programs
bind = ALT, r, exec, wofi --show drun
bind = ALT, n, exec, swaync-client -t -sw
bind = ALT, t, exec, ghostty
bind = ALT, w, exec, firefox

# Move focus with hjkl
bind = ALT, h, movefocus, l
bind = ALT, j, movefocus, d
bind = ALT, k, movefocus, u
bind = ALT, l, movefocus, r

# Switch workspaces
bind = ALT, u, workspace, 1
bind = ALT, i, workspace, 2
bind = ALT, o, workspace, 3
bind = ALT, p, workspace, 4
bind = ALT SHIFT, u, workspace, 5
bind = ALT SHIFT, i, workspace, 6
bind = ALT SHIFT, o, workspace, 7
bind = ALT SHIFT, p, workspace, 8

# Move active window hjkl
bind = SUPER, h, movewindow, l
bind = SUPER, j, movewindow, d
bind = SUPER, k, movewindow, u
bind = SUPER, l, movewindow, r

# Move active window to a workspace
bind = SUPER, u, movetoworkspace, 1
bind = SUPER, i, movetoworkspace, 2
bind = SUPER, o, movetoworkspace, 3
bind = SUPER, p, movetoworkspace, 4
bind = SUPER SHIFT, u, movetoworkspace, 5
bind = SUPER SHIFT, i, movetoworkspace, 6
bind = SUPER SHIFT, o, movetoworkspace, 7
bind = SUPER SHIFT, p, movetoworkspace, 8

# Move/resize windows with mouse buttons and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Volume keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}
