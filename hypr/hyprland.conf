################
### MONITORS ###
################

source = ~/.config/dotfiles-device/hyprland-monitors.conf

#################
### AUTOSTART ###
#################

exec-once = hyprpaper
exec-once = waybar
exec-once = emacs --daemon
exec-once = emacs-client -c

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################

general {
    border_size = 2
    gaps_in = 5
    gaps_out = 10

    col.inactive_border = rgba(44415aff)
    col.active_border = rgba(deb1ffff) rgba(9b8bf8ff) 45deg
}

decoration {
    rounding = 10

    active_opacity = 1.0
    inactive_opacity = 1.0

    drop_shadow = true
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(010316ff)

    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    background_color = rgba(010316ff)
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = ctrl:nocaps
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

gestures {
    workspace_swipe = false
}

####################
### KEYBINDINGSS ###
####################

# Utilities
bind = CTRL ALT, delete, exit, # exit hyprland
bind = CTRL ALT, q, killactive, # close program in active window
bind = CTRL ALT, f, fullscreen, toggle

# Programs
bind = CTRL ALT, e, exec, emacsclient -a "" -c
bind = CTRL ALT, r, exec, emacsclient -a "" -cF "((visibility . nil))" -e "(my-emacs-launcher)"
bind = CTRL ALT SHIFT, e, exec, emacs --debug-init
bind = CTRL ALT, t, exec, kitty
bind = CTRL ALT, w, exec, firefox

# Move focus with hjkl
bind = CTRL ALT, h, movefocus, l
bind = CTRL ALT, j, movefocus, d
bind = CTRL ALT, k, movefocus, u
bind = CTRL ALT, l, movefocus, r

# Switch workspaces
bind = CTRL ALT, u, workspace, 1
bind = CTRL ALT, i, workspace, 2
bind = CTRL ALT, o, workspace, 3
bind = CTRL ALT, p, workspace, 4
bind = CTRL ALT SHIFT, u, workspace, 5
bind = CTRL ALT SHIFT, i, workspace, 6
bind = CTRL ALT SHIFT, o, workspace, 7
bind = CTRL ALT SHIFT, p, workspace, 8

# Move active window hjkl
bind = SUPER, h, movewindow, l
bind = SUPER, j, movewindow, d
bind = SUPER, k, movewindow, u
bind = SUPER, l, movewindow, r

# Move active window to a workspace
bind = SUPER, u, movetoworkspace, 1
bind = SUPER, i, movetoworkspace, 2
bind = SUPER, o, movetoworkspace, 3
bind = SUPER, p, movetoworkspace, 4
bind = SUPER SHIFT, u, movetoworkspace, 5
bind = SUPER SHIFT, i, movetoworkspace, 6
bind = SUPER SHIFT, o, movetoworkspace, 7
bind = SUPER SHIFT, p, movetoworkspace, 8

# Move/resize windows with mouse buttons and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrulev2 = suppressevent maximize, class:.*

# Create a centered floating window for the emacs app launcher
windowrulev2 = size 600 300,title:^emacs-launcher$
windowrulev2 = float,title:^emacs-launcher$
windowrulev2 = center,title:^emacs-launcher$
